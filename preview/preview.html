<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE Overflow Import Preview</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #00d9ff; text-align: center; }
        .question {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #00d9ff;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .q-id {
            background: #00d9ff;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .q-type {
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .q-stem { font-size: 1.1em; line-height: 1.6; margin-bottom: 15px; }
        .options { list-style: none; padding: 0; }
        .options li {
            background: #0f3460;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .options li:hover { background: #1a5276; }
        .option-id {
            background: #00d9ff;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 10px;
            font-weight: bold;
        }
        .confidence {
            font-size: 0.8em;
            color: #888;
            margin-top: 10px;
        }
        .meta {
            text-align: center;
            color: #888;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>🎓 GATE Overflow Import Preview</h1>
    <p style="text-align:center;color:#888;">Showing first 5 of 0 questions</p>

    <div class="meta">
        <p>Generated: 2026-01-14 18:29:27</p>
        <p>Import pipeline by Antigravity AI</p>
    </div>
</body>
</html>
